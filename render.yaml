services:
  - type: web
    name: wangare-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.17.0
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: PESAPAL_ENV
        value: live
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: PESAPAL_CALLBACK_URL
        sync: false
      - key: PESAPAL_IPN_URL
        sync: false
